        function switchLang(lang) {
            currentLang = lang;
            const t = translations[lang];

            document.getElementById('title').textContent = t.title;
            document.getElementById('subTitle').textContent = t.subTitle;

            for (let i = 0; i <= 8; i++) {
                const btn = document.getElementById('btn' + i);
                if (btn) btn.textContent = t['btn' + i];
            }

            document.getElementById('currencyTitle').textContent = t.currencyTitle;
            document.getElementById('discountTitle').textContent = t.discountTitle;
            document.getElementById('lengthTitle').textContent = t.lengthTitle;
            document.getElementById('weightTitle').textContent = t.weightTitle;
            document.getElementById('tempTitle').textContent = t.tempTitle;
            document.getElementById('areaTitle').textContent = t.areaTitle;
            document.getElementById('volumeTitle').textContent = t.volumeTitle;
            document.getElementById('speedTitle').textContent = t.speedTitle;
            document.getElementById('powerTitle').textContent = t.powerTitle;

            document.getElementById('originalLabel').textContent = t.originalLabel;
            document.getElementById('rateLabel').textContent = t.rateLabel;

            // 更新 Footer 連結文字
            if (document.getElementById('footerPrivacy')) {
                document.getElementById('footerPrivacy').textContent = (lang === 'en') ? "Privacy Policy" : "隱私權政策";
            }
            if (document.getElementById('footerContact')) {
                document.getElementById('footerContact').textContent = (lang === 'en') ? "Contact Us" : "聯絡我們";
            }

            // 重新計算目前 TAB
            if (document.querySelector('.calculator.active')) {
                const activeId = document.querySelector('.calculator.active').id;
                if (activeId === 'tab1') calcDiscount();
                else if (activeId === 'tab0') convertCurrency();
            }
        }

        function showTab(n) {
            document.querySelectorAll('.calculator').forEach(el => el.classList.remove('active'));
            const tab = document.getElementById('tab' + n);
            if (tab) tab.classList.add('active');

            document.querySelectorAll('.tab-button').forEach((btn, i) => {
                if (btn) btn.classList.toggle('active', i === n);
            });
        }

        // ==================== 所有計算功能 ====================
        function calcDiscount() {
            let price = parseFloat(document.getElementById('originalPrice').value) || 0;
            let rate = parseFloat(document.getElementById('discountRate').value) || 0;
            let final = price * (1 - rate/100);
            let save = price * (rate/100);
            if (currentLang === 'en') {
                document.getElementById('discountResult').innerHTML = `Final Price: ${final.toFixed(2)}<br>You Save: ${save.toFixed(2)} (${rate}%)`;
            } else {
                document.getElementById('discountResult').innerHTML = `最終價格：${final.toFixed(2)}<br>節省金額：${save.toFixed(2)} (${rate}%)`;
            }
        }
// === 貨幣換算（穩定安全版 - 2026-05-10）===
function convertCurrency() {
    let amount = parseFloat(document.getElementById('currencyAmount').value) || 0;
    let from = document.getElementById('fromCurrency').value;
    let to = document.getElementById('toCurrency').value;

    if (amount <= 0) {
        document.getElementById('currencyResult').innerHTML = "Please enter a valid amount";
        return;
    }

    document.getElementById('currencyResult').innerHTML = "Getting latest rate...";

    // 呼叫免費 API
    fetch(`https://api.exchangerate.host/latest?base=${from}&symbols=${to}`)
        .then(r => r.json())
        .then(data => {
            let rate = data.rates ? data.rates[to] : null;
            if (rate && rate > 0) {
                let result = (amount * rate).toFixed(4);
                document.getElementById('currencyResult').innerHTML = 
                    `${amount} ${from} = ${result} ${to}<br><small style="color:#4CAF50;">Live Rate</small>`;
            } else {
                useFallbackRate();
            }
        })
        .catch(() => useFallbackRate());

// === 調換貨幣按鈕 ===
function swapCurrencies() {
    let from = document.getElementById('fromCurrency');
    let to = document.getElementById('toCurrency');
    if (from && to) {
        let temp = from.value;
        from.value = to.value;
        to.value = temp;
        convertCurrency();
    }
}
		
        function convertLength() {
            let val = parseFloat(document.getElementById('lengthInput').value) || 0;
            let from = document.getElementById('fromLength').value;
            let to = document.getElementById('toLength').value;
            const factors = {cm:1, inch:2.54, m:100, ft:30.48, km:100000};
            let result = (val * (factors[from] || 1) / (factors[to] || 1)).toFixed(4);
            document.getElementById('resultLength').innerHTML = `${val} ${from} = ${result} ${to}`;
        }
        function swapLength() { let a = document.getElementById('fromLength'); let b = document.getElementById('toLength'); if(a&&b)[a.value,b.value]=[b.value,a.value]; convertLength(); }

        function convertWeight() {
            let val = parseFloat(document.getElementById('weightInput').value) || 0;
            let from = document.getElementById('fromWeight').value;
            let to = document.getElementById('toWeight').value;
            const factors = {kg:1, lb:0.453592, g:0.001, oz:0.0283495};
            let result = (val * (factors[from]||1) / (factors[to]||1)).toFixed(4);
            document.getElementById('resultWeight').innerHTML = `${val} ${from} = ${result} ${to}`;
        }
        function swapWeight() { let a = document.getElementById('fromWeight'); let b = document.getElementById('toWeight'); if(a&&b)[a.value,b.value]=[b.value,a.value]; convertWeight(); }

            else result = `${val} ${from} = ${val} ${to}`;
            document.getElementById('resultTemp').innerHTML = result;
        }
